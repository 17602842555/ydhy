name: Deploy backend to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'scripts/export-d1-seed.mjs'
      - 'scripts/prepare-cloudflare-config.mjs'
      - 'wrangler.jsonc'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
      HUAGE_CORS_ORIGIN: ${{ vars.HUAGE_CORS_ORIGIN || 'https://17602842555.github.io,http://127.0.0.1:5173' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate D1 seed
        run: npm run cf:seed:generate

      - name: Prepare Wrangler config
        run: node scripts/prepare-cloudflare-config.mjs

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply DB --remote

      - name: Seed D1 if empty
        run: npx wrangler d1 execute DB --remote --file apps/api/d1/seed.sql

      - name: Deploy Worker
        run: npx wrangler deploy
